<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary - VocabApp</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <nav class="navbar">
        <div class="brand">
            <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21L4 12V4C4 4 8 4 12 8C16 4 20 4 20 4V12L12 21Z" fill="var(--primary)" fill-opacity="0.1"
                    stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M12 21V8" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <h2>VocabApp</h2>
        </div>

        <div class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="categories.html">Categories</a>
            <a href="flashcard.html">Flashcard</a>
            <a href="quiz.html">Quiz</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Vocabulary Words</h1>
            <div class="actions">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search vocabulary...">
                <button class="btn-success" id="addVocabularyBtn">
                    + Add New Word
                </button>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Word</th>
                    <th>Meaning</th>
                    <th>Category</th>
                     <th>Action</th>
                </tr>
            </thead>

            <tbody id="vocabularyTable"></tbody>
        </table>

    </div>

    <footer>
        © 2024 VocabApp. All rights reserved.
    </footer>

    <div class="modal" id="vocabModal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Vocabulary</h3>
            <input type="text" id="wordInput" placeholder="English word" />
            <input type="text" id="meaningInput" placeholder="Meaning" />
            <select id="categorySelect"></select>
            <div class="modal-actions">
                <button class="btn-primary" id="saveVocabulary">
                    Save
                </button>
                <button class="btn-danger" id="closeModal">
                    Cancel
                </button>
            </div>
        </div>

    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Confirm Delete</h3>
            <p>Are you sure you want to delete this word?</p>

            <div class="modal-actions">
                <button class="btn-danger" id="confirmDelete">
                    Delete
                </button>

                <button class="btn-primary" id="cancelDelete">
                    Cancel
                </button>
            </div>
        </div>
    </div>


    <script src="../js/app.js"></script>
    <script src="../js/vocabulary.js"></script>

</body>

</html>
