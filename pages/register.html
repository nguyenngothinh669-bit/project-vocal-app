<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VocabApp</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">VocabApp</div>
        <div>
            <a href="login.html" class="btn-primary small">Login</a>
            <a href="register.html" class="btn-success small">Register</a>
        </div>
    </nav>

    <div class="auth-container">

        <div class="auth-box">
            <h2>Create Account </h2>

            <form id="registerForm">

                <input type="text" id="firstName" placeholder="First Name">
                <small id="firstNameError" class="error"></small>

                <input type="text" id="lastName" placeholder="Last Name">
                <small id="lastNameError" class="error"></small>

                <input type="email" id="email" placeholder="Email Address">
                <small id="emailError" class="error"></small>

                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="Password">
                    <button type="button" class="toggle-password" aria-label="Hiển thị mật khẩu">
                        <svg xmlns="http://www.w3.org/2000/svg" class="eye-icon" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l3.59 3.59" />
                        </svg>
                    </button>
                </div>
                <small id="passwordError" class="error"></small>

                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    <button type="button" class="toggle-password" aria-label="Hiển thị mật khẩu">
                        <svg xmlns="http://www.w3.org/2000/svg" class="eye-icon" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l3.59 3.59" />
                        </svg>
                    </button>
                </div>
                <small id="confirmPasswordError" class="error"></small>

                <button type="submit">Register</button>
            </form>

            <div class="switch-auth">
                Already have an account?
                <a href="login.html">Login here</a>
            </div>
        </div>

    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
