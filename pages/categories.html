<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Categories - VocabApp</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <nav class="navbar">
        <h2>VocabApp</h2>
        <div class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="categories.html">Categories</a>
            <a href="vocabulary.html">Vocabulary</a>
            <a href="flashcard.html">Flashcard</a>
            <a href="quiz.html">Quiz</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Vocabulary Categories</h1>
            <div class="actions">
                <input type="text" id="searchInput" placeholder="Search category...">
                <button class="btn-success" id="addCategoryBtn">
                    + Add Category
                </button>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="categoryTable"></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>

    <footer>
        © 2024 VocabApp. All rights reserved.
    </footer>

    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Category</h3>
            <input type="text" id="categoryName" placeholder="Category name" />
            <textarea id="categoryDescription" placeholder="Description"></textarea>
            <div class="modal-actions">
                <button class="btn-primary" id="saveCategory">
                    Save
                </button>
                <button class="btn-danger" id="closeModal">
                    Cancel
                </button>
            </div>
        </div>
    </div>


    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Confirm delete</h3>
            <p>Are you sure you want to delete this category?</p>
            <div class="modal-actions">
                <button class="btn-danger" id="confirmDelete">
                    Delete
                </button>
                <button class="btn-primary" id="cancelDelete">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/categories.js"></script>

</body>

</html>
