<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard - VocabApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="brand">
            <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21L4 12V4C4 4 8 4 12 8C16 4 20 4 20 4V12L12 21Z" fill="var(--primary)" fill-opacity="0.1"
                    stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M12 21V8" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <h2>VocabApp</h2>
        </div>

        <div class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="categories.html">Categories</a>
            <a href="vocabulary.html">Vocabulary</a>
            <a href="quiz.html">Quiz</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Flashcard Learning</h1>
            <div class="actions">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
                <input type="text" id="searchWord" placeholder="Search word...">
                <select id="sortSelect">
                    <option value="name">Sort by Name</option>
                    <option value="time">Sort by Time</option>
                </select>
            </div>
        </div>

        <div class="flashcard-wrapper">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner">
                    <div class="flashcard-front">

                        <button id="voiceBtn" class="voice-btn">🔊</button>
                        <span id="cardWord">No words available</span>
                        <span id="cardMeaning">Meaning</span>

                        <!-- Skeleton loading khi AI đang xử lý -->
                        <div id="cardImageSkeleton">
                            <div class="skeleton-shimmer"></div>
                            <div class="skeleton-label">
                                <span class="skeleton-ai-icon">✦</span>
                                AI đang tìm hình ảnh...
                            </div>
                        </div>

                        <!-- Ảnh từ AI -->
                        <div id="cardImage">
                            <img id="cardImg" src="" alt="" loading="lazy">
                            <div class="image-overlay-gradient"></div>
                            <span class="ai-image-badge">✦ AI Image</span>
                        </div>

                        <!-- Fallback khi không có ảnh -->
                        <div id="cardImageFallback">
                            <span class="fallback-icon">🖼️</span>
                            <span class="fallback-text">Không tìm được hình ảnh</span>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Mô tả AI (hiện bên dưới card, ngoài card) -->
            <div class="card-description-wrap" id="cardDescriptionWrap">
                <p id="cardDescription"></p>
            </div>

            <div class="flashcard-controls">
                <button class="btn-primary" id="prevBtn">Previous</button>
                <button class="btn-success" id="learnedBtn">Mark as Learned</button>
                <button class="btn-primary" id="nextBtn">Next</button>
            </div>

            <div class="progress-box">
                <span>Progress</span>
                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>
                <span id="progressText">0/0</span>
            </div>
        </div>

        <h2 class="section-title">Word List</h2>

        <table class="table">
            <thead>
                <tr>
                    <th>Word</th>
                    <th>Meaning</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="wordList"></tbody>
        </table>
    </div>

    <footer>
        © 2024 VocabApp. All rights reserved.
    </footer>

    <script src="../js/app.js"></script>
    <script src="../js/flashcard.js"></script>

</body>

</html>
